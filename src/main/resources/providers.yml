#########################
# ThunderLBs providers  #
#########################

# Built-in providers (topper, timedtopper, and ajleaderboards) use native APIs
# and do not need entries in this file. Group boards using the topper provider
# automatically use GroupTopper.
#
# Custom PlaceholderAPI patterns may use %holder%, %position%, and %interval%.
# At minimum, configure the four player fields below, then select the section's
# name with the "provider" option in config.yml. Group providers may also define
# group-name, group-value, group-viewer-rank, group-viewer-value, and group-team.
examplelbprovider:
  name: "%examplelb_%holder%_%position%_name%"
  value: "%examplelb_%holder%_%position%_value%"
  viewer-rank: "%examplelb_%holder%_rank%"
  viewer-value: "%examplelb_%holder%_value%"
